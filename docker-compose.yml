version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devflow_network

  redis:
    image: redis:7-alpine
    container_name: devflow_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - devflow_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: devflow_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - devflow_network

  redis-commander:
    image: rediscommander/redis-commander
    container_name: devflow_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - devflow_network

volumes:
  postgres_data:
  redis_data:

networks:
  devflow_network:
    driver: bridge
